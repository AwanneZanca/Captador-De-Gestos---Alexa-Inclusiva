<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexa Inclusiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <style>
        /* Seu CSS (sem alterações) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0c0c;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .chat-container {
            background-color: #1a1a1a;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.5s ease-in-out, opacity 0.5s ease-in-out;
        }
        .chat-header {
            background-color: #262626;
            padding: 1rem;
            border-top-left-radius: 1.5rem;
            border-top-right-radius: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .chat-header img {
            border-radius: 50%;
            border: 2px solid #5a5a5a;
        }
        .chat-messages {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message-bubble {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            line-height: 1.4;
        }
        .bot-message {
            background-color: #2d3748;
            align-self: flex-start;
        }
        .user-message {
            background-color: #4c51bf;
            align-self: flex-end;
            color: #fff;
        }
        .chat-input {
            padding: 1rem;
            background-color: #262626;
            border-bottom-left-radius: 1.5rem;
            border-bottom-right-radius: 1.5rem;
        }
        .chat-input form {
            display: flex;
            gap: 0.5rem;
        }
        .chat-input input {
            flex-grow: 1;
            background-color: #3b3b3b;
            border: none;
            padding: 0.75rem;
            border-radius: 1.25rem;
            color: #e0e0e0;
        }
        .chat-input button {
            background-color: #4c51bf;
            color: #fff;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .chat-input button:hover {
            background-color: #5a60c9;
        }
        .sim-buttons {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .sim-buttons button {
            background-color: #4c51bf;
            color: #fff;
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .mediapipe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0c0c;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .mediapipe-container.active {
            display: flex;
        }
        .mediapipe-content {
            position: relative;
            width: 100%;
            max-width: 800px;
        }
        .mediapipe-content video, .mediapipe-content canvas {
            width: 100%;
            height: auto;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: scaleX(-1);
        }
        .mediapipe-content canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .status-message {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            color: white;
            font-size: 1.125rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .status-message.visible {
            opacity: 1;
        }
        @media (max-width: 768px) {
            .chat-container {
                height: 95vh;
                margin: 0.5rem;
            }
        }
    </style>
</head>
<body class="bg-gray-900">

    <div id="chat-ui" class="chat-container">
        <div class="chat-header">
            <img src="https://placehold.co/64x64/2d3748/fff?text=AI" alt="Ícone da Alexa" class="w-12 h-12">
            <h1 class="text-2xl font-semibold text-gray-200">Alexa Inclusiva</h1>
        </div>
        <div id="messages" class="chat-messages">
            <div class="message-bubble bot-message">
                Olá, eu sou a Alexa inclusiva
            </div>
        </div>
        <div class="chat-input">
            <form id="chat-form" style="display: none;">
                <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off" class="focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-opacity-50">
                <button type="submit" class="rounded-full">Enviar</button>
            </form>
            <div id="button-container" class="sim-buttons">
                </div>
        </div>
    </div>

    <div id="mediapipe-ui" class="mediapipe-container">
        <h2 class="text-3xl font-bold mb-4">Captador de Gestos</h2>
        <div class="mediapipe-content">
            <video id="video-feed" class="w-full h-auto" autoplay playsinline></video>
            <canvas id="gesture-canvas" class="w-full h-auto"></canvas>
            <div id="status-message" class="status-message">Aguardando gesto...</div>
        </div>
    </div>

    <script>
        // Referências (sem alterações)
        const chatUi = document.getElementById('chat-ui');
        const mediapipeUi = document.getElementById('mediapipe-ui');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const messagesContainer = document.getElementById('messages');
        const buttonContainer = document.getElementById('button-container'); 
        const videoElement = document.getElementById('video-feed');
        const canvasElement = document.getElementById('gesture-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusMessage = document.getElementById('status-message');

        
        let currentMode = null;
        let websocket;
        let cameraStream;
        let ultimoGestoEnviado = null; 

        // Função DOMContentLoaded (sem alterações)
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                addMessage("Gostaria de iniciar alguma simulação?", 'bot');
                showInitialButtons();
            }, 500); 
        });

        function returnToChat() {
            console.log("Retornando para a visualização do chat.");
            ultimoGestoEnviado = null; 
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            videoElement.srcObject = null;
            mediapipeUi.classList.remove('active');
            mediapipeUi.style.display = 'none';
            chatUi.style.display = 'flex';
            
            const inputArea = document.querySelector('.chat-input');
            if (inputArea) {
                inputArea.style.display = 'block'; 
            }
            showInitialButtons(); 

            setTimeout(() => {
                chatUi.style.transform = 'scale(1)';
                chatUi.style.opacity = '1';
            }, 50);
            addMessage('Captador de gestos fechado.', 'bot');
            addMessage("Gostaria de iniciar alguma simulação?", 'bot');
        }

        // Função keydown (sem alterações)
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && mediapipeUi.style.display === 'flex') {
                returnToChat();
            }
        });

        // Funções addMessage, clearButtons, showInitialButtons, showSimulationChoiceButtons, handleInitialChoice, handleSimulationChoice (sem alterações)
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message-bubble');
            messageDiv.textContent = text;
            if (sender === 'user') {
                messageDiv.classList.add('user-message');
            } else {
                messageDiv.classList.add('bot-message');
            }
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function clearButtons() {
            buttonContainer.innerHTML = '';
        }

        function showInitialButtons() {
            clearButtons();
            chatForm.style.display = 'none'; 
            buttonContainer.style.display = 'flex'; 

            const options = ["Sim", "Apenas abrir Captador de Gestos"];
            options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.addEventListener('click', () => handleInitialChoice(option));
                buttonContainer.appendChild(button);
            });
        }

        function showSimulationChoiceButtons() {
            clearButtons();
            const options = ["Micro-ondas", "Campainha"];
            options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option;
                button.addEventListener('click', () => handleSimulationChoice(option));
                buttonContainer.appendChild(button);
            });
        }

        function handleInitialChoice(choice) {
            addMessage(choice, 'user'); 
            if (choice === "Sim") {
                addMessage("Qual simulação gostaria de iniciar?", 'bot');
                showSimulationChoiceButtons(); 
            } else if (choice === "Apenas abrir Captador de Gestos") {
                handleSimulationChoice('Nenhuma'); 
            }
        }

        function handleSimulationChoice(choice) {
            console.log(`O usuário escolheu: ${choice}`);
            const choiceLower = choice.toLowerCase();
            let botMessage = '';

            if (choice !== 'Nenhuma') {
                addMessage(choice, 'user');
            }

            if (choiceLower === 'micro-ondas') { 
                botMessage = 'Iniciando a simulação do micro-ondas...';
                currentMode = 'microondas';
            } else if (choiceLower === 'campainha') {
                botMessage = 'Iniciando a simulação da campainha...';
                currentMode = 'campainha';
            } else { 
                botMessage = 'Ok. Iniciando o captador de gestos sem simulação.';
                currentMode = null;
            }
            
            addMessage(botMessage, 'bot');
            
            const inputArea = document.querySelector('.chat-input');
            if (inputArea) {
                inputArea.style.display = 'none'; 
            }
            
            startGestureRecognizer();
        }

        // Configuração do MediaPipe Hands (sem alterações)
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        
        // Função onResults (sem alterações)
        function onResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.save();
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#FFFFFF', lineWidth: 5});
                    drawLandmarks(canvasCtx, landmarks, {color: '#4c51bf', lineWidth: 2});
                }
                const handPoints = results.multiHandLandmarks[0].map(lm => ({ x: lm.x, y: lm.y, z: lm.z }));
                const gesto = detectarGesto(handPoints); // <-- Chama a função corrigida

                if (gesto) {
                    exibirMensagemStatus(`Gesto: ${gesto}`);
                    
                    if (gesto !== ultimoGestoEnviado) {
                        const comando = gesto.toLowerCase(); // "ligar", "desligar" ou "parar"
                        console.log(`Enviando comando: ${comando}`);
                        
                        if (websocket && websocket.readyState === WebSocket.OPEN) {
                            websocket.send(comando); 
                        }
                        ultimoGestoEnviado = gesto; 
                    }

                } else {
                    exibirMensagemStatus('Aguardando gesto...');
                    ultimoGestoEnviado = null; 
                }
            } else {
                exibirMensagemStatus('Mão não detectada...');
                ultimoGestoEnviado = null; 
            }
            canvasCtx.restore();
        }
        hands.onResults(onResults);

        // Função startGestureRecognizer (sem alterações)
        async function startGestureRecognizer() {
            chatUi.style.transform = 'scale(0.8) translateY(-100px)';
            chatUi.style.opacity = '0';
            setTimeout(() => {
                chatUi.style.display = 'none';
                mediapipeUi.style.display = 'flex';
                setTimeout(() => mediapipeUi.classList.add('active'), 100);
            }, 500);
            
            const wsUrl = `ws://${window.location.hostname}/ws`;
            websocket = new WebSocket(wsUrl);

            websocket.onopen = () => {
                console.log('Conexão WebSocket aberta.');
                exibirMensagemStatus('Conectado ao ESP32.');
                if (currentMode === 'microondas') {
                    console.log('Enviando comando: microondas_on');
                    websocket.send('microondas_on');
                } 
                else if (currentMode === 'campainha') {
                    console.log('Enviando comando: campainha_on');
                    websocket.send('campainha_on');
                }
            };

            websocket.onmessage = (event) => {
                const message = event.data;
                if (message === 'microondas_beeping') {
                    exibirMensagemStatus('Micro-ondas apitando');
                } 
                else if (message === 'campainha_ringing') { 
                    exibirMensagemStatus('Campainha tocando');
                }
            };

            websocket.onclose = () => {
                console.log('Conexão WebSocket fechada.');
                exibirMensagemStatus('Conexão com ESP32 perdida.');
            };

            websocket.onerror = (error) => {
                console.error('Erro no WebSocket:', error);
                exibirMensagemStatus('Erro na conexão com ESP32.');
            };

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                videoElement.srcObject = cameraStream;
                
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 640,
                    height: 480
                });
                camera.start();

                videoElement.onloadeddata = () => {
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                };

            } catch (err) {
                console.error("Erro ao acessar a câmera: ", err);
                const errorDiv = document.createElement('div');
                errorDiv.innerHTML = `<strong>Erro ao acessar a câmera.</strong><br><br>
1. Verifique se você permitiu o acesso à câmera quando o navegador perguntou.<br>
2. Navegadores modernos podem bloquear a câmera em conexões não seguras (http). Tente em outro navegador ou em um celular Android, se possível.`;
                errorDiv.classList.add('message-bubble', 'bot-message', 'p-4', 'leading-relaxed');
                mediapipeUi.querySelector('.mediapipe-content').innerHTML = '';
                mediapipeUi.querySelector('.mediapipe-content').appendChild(errorDiv);
            }
        }

        // ===============================================
        // FUNÇÃO detectarGesto (CORRIGIDA)
        // ===============================================
        function detectarGesto(landmarks) {
            
            // --- AQUI ESTÁ A CORREÇÃO ---
            // A lógica de cálculo do ângulo estava com um loop infinito
            function angleBetween(p1, p2, p3) {
                const a = { x: p1.x - p2.x, y: p1.y - p2.y };
                const b = { x: p3.x - p2.x, y: p3.y - p2.y };
                const dot = a.x * b.x + a.y * b.y;
                const magA = Math.sqrt(a.x * a.x + a.y * a.y);
                const magB = Math.sqrt(b.x * b.x + b.y * b.y);
                if (magA * magB === 0) return 0;
                
                // 1. Calcula o cosAngle primeiro
                let cosAngle = dot / (magA * magB);
                
                // 2. Garante que o valor está entre -1 e 1 (para o Math.acos)
                cosAngle = Math.min(1.0, Math.max(-1.0, cosAngle));
                
                // 3. Retorna o ângulo em graus
                return Math.acos(cosAngle) * 180 / Math.PI;
            }
            // --- FIM DA CORREÇÃO ---

            const anguloThumb = angleBetween(landmarks[2], landmarks[3], landmarks[4]);
            const anguloIndicador = angleBetween(landmarks[5], landmarks[6], landmarks[8]);
            const anguloMedio = angleBetween(landmarks[9], landmarks[10], landmarks[12]);
            const anguloAnelar = angleBetween(landmarks[13], landmarks[14], landmarks[16]);
            const anguloMindinho = angleBetween(landmarks[17], landmarks[18], landmarks[20]);
            
            const anguloEstendido = 160; 
            const anguloDobrado = 90;    
            const thumbEstendido = 160;  
            const thumbFechado = 120;
 
            // Gesto "Ligar" (Polegar e Indicador esticados, outros dobrados)
            if (anguloThumb > thumbEstendido && 
                anguloIndicador > anguloEstendido && 
                anguloMedio < anguloDobrado && 
                anguloAnelar < anguloDobrado && 
                anguloMindinho < anguloDobrado) {
                return "Ligar";
            }
            
            // Gesto "Desligar" (Polegar dobrado, Indicador esticado, outros dobrados)
            if (anguloThumb < thumbFechado && 
                anguloIndicador > anguloEstendido && 
                anguloMedio < anguloDobrado && 
                anguloAnelar < anguloDobrado && 
                anguloMindinho < anguloDobrado) {
                return "Desligar";
            }
            
            // Gesto "Parar" (Mão aberta - todos os dedos esticados)
            if (anguloThumb > thumbEstendido && 
                anguloIndicador > anguloEstendido && 
                anguloMedio > anguloEstendido && 
                anguloAnelar > anguloEstendido && 
                anguloMindinho > anguloEstendido) {
                return "Parar";
            }

            return null;
        }

        // Função exibirMensagemStatus (sem alterações)
        let statusTimeout;
        function exibirMensagemStatus(mensagem) {
            statusMessage.textContent = mensagem;
            statusMessage.classList.add('visible');
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => {
                statusMessage.classList.remove('visible');
            }, 3000); 
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</body>
</html>
